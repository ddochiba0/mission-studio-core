name: Mission Studio CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mission-studio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate environment template
        run: pnpm check:env-example
      - name: Type check
        run: pnpm typecheck
      - name: Automatic tests
        timeout-minutes: 3
        run: pnpm test
      - name: Production build
        run: pnpm build
